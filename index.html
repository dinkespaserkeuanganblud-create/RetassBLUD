<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retass BLUD - Dinkes Kab. Paser</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Efek cahaya modern */
        body::before {
            content: ""; position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.3) 0%, rgba(0,0,0,0) 70%);
            top: -200px; left: -150px; z-index: 0;
        }
        body::after {
            content: ""; position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px; right: -100px; z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
        }

        .logo-box {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 20px;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 25px auto;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.4);
            transform: rotate(-10deg);
        }
        .logo-box i { transform: rotate(10deg); font-size: 35px; }

        h1 { font-size: 28px; margin: 0 0 10px 0; font-weight: 700; letter-spacing: 1px;}
        p { color: #cbd5e1; margin: 0 0 35px 0; font-size: 14px; line-height: 1.6; }

        .btn-masuk {
            display: block;
            width: 100%;
            padding: 15px 0;
            background: #ffffff;
            color: #1e3a8a;
            text-decoration: none;
            font-weight: 700;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            box-sizing: border-box; /* Agar padding tidak melebihi width 100% */
        }
        .btn-masuk:hover {
            background: #e2e8f0;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-box">
            <i class="fas fa-chart-pie"></i>
        </div>
        <h1>Retass BLUD</h1>
        <p>Sistem Informasi Realisasi & Rekonsiliasi Anggaran BLUD<br>Dinas Kesehatan Kab. Paser</p>
        
        <a href="https://script.google.com/macros/s/AKfycbzrsc_WxwcMa8b9N7_0Em43LKXEhmkzVg2i7uZlihb3-7SCaUNQnwhPLikqNWCv2xHz/exec" class="btn-masuk">
            <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i> MASUK KE SISTEM
        </a>
    </div>
</body>
</html>

    <style>
        /* CSS Reset & Layout */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Iframe Fullscreen */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        /* Loading Spinner */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #1e3a8a; /* Biru Dinkes */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 15px;
            color: #1e3a8a;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loading-text">Memuat Retass BLUD...</div>
    </div>

    <iframe 
        id="appFrame"
        title="Retass BLUD Dinkes Paser"
        src="https://script.google.com/macros/s/AKfycbzrsc_WxwcMa8b9N7_0Em43LKXEhmkzVg2i7uZlihb3-7SCaUNQnwhPLikqNWCv2xHz/exec"
        allowfullscreen="true"
        allow="camera; microphone; geolocation; autoplay; fullscreen"
        onload="hideLoader()">
    </iframe>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader');
            if(loader) {
                // Efek memudar halus
                loader.style.opacity = '0';
                setTimeout(function() {
                    loader.style.display = 'none';
                }, 500);
            }
        }
    </script>

</body>
